<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(83, 0, 183, 0.05);
        }
        
        .input-field {
            background-color: var(--color-surface-dim);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #0051d5; /* secondary color */
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 81, 213, 0.1);
        }
        
        .role-toggle-active {
            background-color: var(--color-primary);
            color: #ffffff;
        }
        
        .role-toggle-inactive {
            background-color: transparent;
            color: var(--color-on-surface-variant);
        }
    </style>

<body class="bg-surface text-on-surface font-body-md text-body-md min-h-screen flex items-center justify-center relative overflow-hidden antialiased">
<!-- High-fashion background image layer -->
<div class="absolute inset-0 z-0">
<img alt="Abstract modern background" class="w-full h-full object-cover opacity-40" data-alt="A high-fashion, soft futuristic abstract background featuring flowing, translucent fabric-like textures in light silvers and very pale lavenders. The scene is illuminated by soft, diffused studio lighting that creates gentle highlights and deep, elegant shadows. The aesthetic is extremely minimalist, premium, and calm, serving as a subtle texture rather than a distracting image. It embodies a clean, light-mode luxury technology brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcHJzaML1RGbww0nHduJH5FoE3FKhih4esr_8rcRxk5AzphbdUI80HvJhfRkqscvh_L9scYopvaQeBdnEUXikplC_eVzOdkli4o3FdoGGurJXCw86Wrr1rIXMKoyQGgDQvKEplCuB3Wt3ZM0dif8X5YTY6kyIG6jHmG8oUQk92u-U-h448faMwn4F94IrX7VTILD9S8OpQPiTEOZc47Yuz-pC0ZZk860b4wLVaKogC5oAkdDSxP3VfVPGR3Pn7YDC6eU2_MMxxjMY"/>
<!-- Subtle gradient overlay to ensure text readability -->
<div class="absolute inset-0 bg-gradient-to-br from-surface/80 to-surface-dim/60"></div>
</div>
<!-- Main Authentication Container -->
<div class="relative z-10 w-full max-w-[480px] px-margin-mobile md:px-0">
<div class="glass-panel rounded-xl p-gutter md:p-stack-md flex flex-col gap-stack-sm">
<!-- Header / Brand -->
<div class="text-center mb-base">
<h1 class="font-display-lg text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary tracking-tighter uppercase mb-2">REVORA</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter the luxury digital ecosystem.</p>
</div>
<!-- Role Selection Toggle -->
<div class="flex p-1 bg-surface-variant rounded-full mb-stack-sm w-full">
<button class="flex-1 py-2 px-4 rounded-full font-label-md text-label-md role-toggle-active transition-colors" type="button">Buyer</button>
<button class="flex-1 py-2 px-4 rounded-full font-label-md text-label-md role-toggle-inactive hover:text-primary transition-colors" type="button">Designer</button>
<button class="flex-1 py-2 px-4 rounded-full font-label-md text-label-md role-toggle-inactive hover:text-primary transition-colors" type="button">Admin</button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-gutter w-full">
<!-- Email Field -->
<div class="flex flex-col gap-2 w-full">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="input-field w-full h-12 pl-12 pr-4 rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2 w-full">
<div class="flex justify-between items-center w-full">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="input-field w-full h-12 pl-12 pr-12 rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 mt-base bg-primary text-on-primary rounded-full font-label-md text-label-md hover:scale-[1.02] transition-transform shadow-[0_8px_20px_rgba(83,0,183,0.15)] flex justify-center items-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-on-primary" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-base w-full">
<div class="h-[1px] bg-outline-variant flex-1"></div>
<span class="font-label-md text-label-md text-outline">OR CONTINUE WITH</span>
<div class="h-[1px] bg-outline-variant flex-1"></div>
</div>
<!-- Social Logins (Minimalist) -->
<div class="flex gap-4 w-full">
<button class="flex-1 h-12 flex items-center justify-center border border-outline-variant rounded-DEFAULT hover:border-primary hover:bg-surface-container-low transition-all bg-surface" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex-1 h-12 flex items-center justify-center border border-outline-variant rounded-DEFAULT hover:border-primary hover:bg-surface-container-low transition-all bg-surface" type="button">
<svg aria-hidden="true" class="w-5 h-5 text-on-surface" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
</button>
</div>
<!-- Footer Link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-base">
                New to REVORA? <a class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4" href="#">Create an account</a>
</p>
</div>
<!-- Trust Indicators below card -->
<div class="flex justify-center items-center gap-6 mt-8 opacity-60">
<span class="font-label-md text-[10px] text-on-surface uppercase tracking-widest flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 14px;">verified_user</span> Secure
            </span>
<span class="font-label-md text-[10px] text-on-surface uppercase tracking-widest flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 14px;">diamond</span> Premium
            </span>
<span class="font-label-md text-[10px] text-on-surface uppercase tracking-widest flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 14px;">speed</span> Fast
            </span>
</div>
</div>
